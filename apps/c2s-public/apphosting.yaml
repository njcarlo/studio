# Firebase App Hosting backend for the public C2S Group Finder.
# Custom domain (required for the product URL scheme):
#   https://c2s.{NEXT_PUBLIC_ROOT_DOMAIN}  → default https://c2s.cogdasma.app
#
# All module apps use: https://[module].[domain].app
#   studio.cogdasma.app     → apps/web
#   c2s.cogdasma.app        → apps/c2s-public
#   inventory.cogdasma.app  → apps/inventory (when migrated)

runConfig:
  maxInstances: 2
  memoryMiB: 512
  cpu: 1

env:
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability: [BUILD, RUNTIME]
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_ROOT_DOMAIN
    value: cogdasma.app
    availability: [BUILD, RUNTIME]
  # Optional brand overrides (defaults in @studio/core-engine/tenant):
  # - variable: NEXT_PUBLIC_BRAND_NAME
  #   value: Church of God Dasmariñas
  #   availability: [BUILD, RUNTIME]
  # - variable: NEXT_PUBLIC_BRAND_PRIMARY
  #   value: "#f43f5e"
  #   availability: [BUILD, RUNTIME]
  - variable: TENANT_ID
    value: cog-dasma
    availability: [BUILD, RUNTIME]
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability: [RUNTIME]
  - variable: RESEND_FROM_EMAIL
    secret: RESEND_FROM_EMAIL
    availability: [RUNTIME]
