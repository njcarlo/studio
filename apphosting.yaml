runConfig:
  maxInstances: 4
scripts:
  buildCommand: "npx prisma generate --schema=prisma/schema.prisma && cd apps/web && npm install && npm run build && cp -r public .next/standalone/apps/web/public && cp -r .next/static .next/standalone/apps/web/.next/static"
  runCommand: "node apps/web/.next/standalone/apps/web/server.js"


env:
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://vpgykxfbrfnojmgmzriq.supabase.co
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    secret: NEXT_PUBLIC_SUPABASE_ANON_KEY
    availability:
      - BUILD
      - RUNTIME
