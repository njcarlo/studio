runConfig:
  maxInstances: 4
scripts:
  buildCommand: "npm run build"
env:
  - variable: GOOGLE_BUILDABLE
    value: apps/web
    availability:
      - BUILD
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://vpgykxfbrfnojmgmzriq.supabase.co
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    secret: NEXT_PUBLIC_SUPABASE_ANON_KEY
    availability:
      - BUILD
      - RUNTIME
