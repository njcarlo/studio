# Firebase App Hosting — canonical deploy target for the COG web app.
# Replaces Vercel (vercel.json removed). App Hosting builds and runs the
# Next.js standalone server; the Admin SDK authenticates via the backend's
# Application Default Credentials (no service-account file needed on-platform).
runConfig:
  maxInstances: 4

scripts:
  # IMPORTANT: Do NOT set buildCommand here. App Hosting's Node buildpack
  # rewrites package.json when buildCommand is present and silently drops the
  # `workspaces` field, which then fails with `npm error No workspaces found!`
  # (firebase/apphosting-adapters#569). Keep the build in package.json as
  # `apphosting:build` instead — the buildpack picks that up without rewriting.
  #
  # runCommand is exec'd directly (not via a shell), so `cd` / env assignments
  # must be wrapped in `sh -c`. Cloud Run sets PORT=8080; Next listens on it.
  runCommand: "sh -c 'cd apps/web/.next/standalone && HOSTNAME=0.0.0.0 node apps/web/server.js'"

env:
  # ── Database (Prisma → Postgres; source of truth during dual-write) ──
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - BUILD
      - RUNTIME

  # ── Firebase web SDK config (public client config; inlined at build) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # ── Scheduled jobs (Cloud Functions call the /api/cron/* endpoints) ──
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
