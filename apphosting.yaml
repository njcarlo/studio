# Firebase App Hosting — canonical deploy target for the COG web app.
# App Hosting builds and runs the Next.js standalone server; the Admin SDK
# authenticates via the backend's Application Default Credentials (no
# service-account file needed on-platform).
runConfig:
  maxInstances: 4
  # Next.js standalone + Prisma needs more than the default 512MiB on cold start.
  memoryMiB: 1024
  cpu: 1

scripts:
  # IMPORTANT: Do NOT set buildCommand here. App Hosting's Node buildpack
  # rewrites package.json when buildCommand is present and silently drops the
  # `workspaces` field, which then fails with `npm error No workspaces found!`
  # (firebase/apphosting-adapters#569). Keep the build in package.json as
  # `apphosting:build` instead — the buildpack picks that up without rewriting.
  #
  # Cloud Run injects HOSTNAME=<pod hostname>. Next's standalone server binds to
  # that value, so the PORT=8080 probe fails unless we force 0.0.0.0. The start
  # script handles that (and is a real executable — no shell needed in runCommand).
  runCommand: "sh scripts/apphosting-start.sh"

env:
  # ── Database (Prisma → Postgres; source of truth during dual-write) ──
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - BUILD
      - RUNTIME

  # ── Firebase web SDK config (public client config; inlined at build) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # Force Next standalone to bind on all interfaces (Cloud Run sets HOSTNAME
  # to the container hostname otherwise, which breaks the startup probe).
  - variable: HOSTNAME
    value: "0.0.0.0"
    availability:
      - RUNTIME

  # Module URLs: https://[module].[domain].app (default domain cogdasma.app)
  # Studio redirects /public/c2s-join → https://c2s.cogdasma.app unless embedded.
  - variable: NEXT_PUBLIC_ROOT_DOMAIN
    value: cogdasma.app
    availability:
      - BUILD
      - RUNTIME

  # Optional white-label overrides (defaults in @studio/core-engine/tenant):
  # NEXT_PUBLIC_BRAND_NAME / SHORT / LOGO_URL / PRIMARY
  # NEXT_PUBLIC_FEATURE_C2S=false  (etc.) hides modules from Studio nav

  # ── Scheduled jobs (Cloud Functions call the /api/cron/* endpoints) ──
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
